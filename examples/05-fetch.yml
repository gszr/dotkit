# to, os, as

map:
  gitconfig:
    to: out/gitconfig
    os: all # all, linux, macos
  zshrc:
    to: out/zshrc
    as: copy
    os: linux
  gpg-agent.conf:
    to: out/gpg-agent.conf
    as: copy
    os: macos
    with:
      PinentryPath: '{{if eq .Os "darwin"}}/opt/homebrew/bin{{else}}/usr/bin{{end}}'

fetch:
- url: https://github.com/gszr/dynamic-colors/archive/refs/heads/master.tar.gz
  to: out/dynamic-colors.tar.gz
  do: mkdir -p out/dynamic-colors && tar -xzf {{from}} -C out/dynamic-colors --strip-components=1
- url: https://github.com/altercation/vim-colors-solarized/archive/refs/heads/master.tar.gz
  to: out/vim-colors-solarized.tar.gz
  do: mkdir -p out/vim/pack/plugins/start/vim-colors-solarized && tar -xzf {{from}} -C out/vim/pack/plugins/start/vim-colors-solarized --strip-components=1
- url: https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
  to: out/

opt:
  cd: examples/

